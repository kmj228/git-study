<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5.layout01.html</title>
</head>
<style>
    .header {
        display: flex;
        height: 100px;
        width: 1000px;
        background-color: orange;
    }

    .body {
        display: flex;
        width: 1000px;
        justify-content: space-between;
        flex-wrap : wrap;
        margin-top: 20px;
    }
    .snb {
        width: 200px;
        background-color: blue;
        margin-right: 10px;
    }
    .contents {
        flex: 1;
        height: 700px;
        background-color: lime;
    }

    .bottom {
        display: flex;
        width: 1000px;
        justify-content: space-between;
        flex-wrap : wrap;
        margin-top: 30px;
        margin-bottom: 20px;
    }
    .bottom-list {
        width: 330px;
        height: 130px;
        background-color: hotpink;
    }

    .footer {
        width: 1000px;
        height: 50px;
        background-color: gray;
    }
</style>
<body>
    <div class="header"></div>

    <div class="body">
        <div class="snb"></div>
        <div class="contents"></div>
    </div>

    <div class="bottom">
        <div class="bottom-list"></div>
        <div class="bottom-list"></div>
        <div class="bottom-list"></div>
    </div>

    <div class="footer"></div>
</body>
</html>
