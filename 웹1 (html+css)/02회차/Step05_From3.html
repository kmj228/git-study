<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step05_From3</title>
</head>
<body>
    <form action="" id="myFrom">
        <label for="id"> 아이디 </label>
        <input type="text" id="id" name="id" /> <br/>

        <label for="pwd"> 비밀번호 </label>
        <input type="password" id="pwd" name="pwd" /> <br/>

        <button type="submit" > 로그인 </button> <br/>
    </form> 
    
    <script>
        document.querySelector('#myFrom').addEventListener('submit', function(e) {
            const inputId = document.querySelector('#id').value;
            const inputPwd = document.querySelector('#pwd').value;

            if (inputId == '') {
                alert('아이디를 입력해주세요')
                e.preventDefault();
            }
            else {
                if (inputPwd == '') {
                    alert('비밀번호를 입력해주세요')
                    e.preventDefault();
                }
            }

            if (inputId == 'admin' && inputPwd == 'admin') {
                alert('Admin 로그인 성공')
            }

        })
    </script>

</body>
</html>
