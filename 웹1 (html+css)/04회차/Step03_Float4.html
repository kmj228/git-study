<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step03_Float4</title>
    <style>
        .f-left {
            width: 200px;
            float: left;
            border-right: 1px solid red;
        }
    </style>
</head>
<body>
    <!-- 
        inline 이랑 비슷하지만 inline은 width 값을 줄 수 없다는 차이점이 있다

        width를 지정하지 않고 float 시키면
        컨텐츠를 포함할 정보의 최소 크기의 width 만 가진다

    -->
    <div class="f-left">짱구</div>
    <div class="f-left">짱구 짱아</div>
    <div class="f-left">짱구 짱아 흰둥이</div>
</body>
</html>
