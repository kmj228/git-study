<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_Position4</title>
    <style>

        .wrapper {
            width: 500px;
            height: 500px;
            border: 1px solid red;
            position: relative;
            margin: 0 auto; /* auto 는 Block 요소의 가운데 정렬을 의미 */
        }
        .box {
            width: 50px;
            height: 50px;
            background-color: yellow;
            position: absolute;
        }
        #one {
            left: 100px;
            top: 100px;
        }
        #two {
            right: 100px;
            top: 100px;
        }
        #three {
            right: 100px;
            bottom: 100px;
        }
        #four {
            left: 100px;
            bottom: 100px;
        }
        #five {
            left: 225px;
            top: 225px;
        }

    </style>
</head>

<body>

    <div class="wrapper">
        <div class="box" id="one"> one </div>
        <div class="box" id="two"> two </div>
        <div class="box" id="three"> three </div>
        <div class="box" id="four"> four </div>
        <div class="box" id="five"> five </div>
    </div>

</body>
</html>
