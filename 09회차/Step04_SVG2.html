<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step04_SVG2.html</title>
    <style>
        body {margin: 0;}
        .svg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color:antiquewhite;
        }
        text {
            font-size:1.5em;
            font-weight: bold;
            fill:red;
        }
        path {
            stroke: blue;
        }
        .special {fill:yellowgreen}
    </style>
</head>
<body>
    <svg class="svg">
        <!-- 나중에 참조할 그래픽 요소를 담아놓은 태그 -->
        <defs>
            <path id="text-curve" d="M 50 400 Q 300 500 400 400 Q 600 170 700 300"></path>
        </defs>
        <text x="20" y="50">
            <textPath href="#text-curve">
                Lorem <tspan class="special">ipsum</tspan> dolor sit amet consectetur adipisicing elit. Atque, iste ipsum? Suscipit nobis hic eius odit quia. Pariatur debitis id laborum voluptatem nostrum at voluptatum voluptate molestiae obcaecati, delectus perferendis?
            </textPath>
        </text>
    </svg>
</body>
</html>
