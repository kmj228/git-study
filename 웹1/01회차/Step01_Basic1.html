<!-- html5 형식의 문서라고 웹브라우저에 알려주는 선언부 -->
<!DOCTYPE html>
<html lang="ko">

    <!-- head 요소에는 문서의 설정 정보와 제목을 작성 -->
    <head>
        <meta charset="UTF-8" >
        <title> Step01_Basic1 </title>
        <style> 
            /* 여기는 CSS 영역 */        
            p {color: blue}
        </style>
    </head>

    <!-- body 요소에는 클라이언트에게 출력할 정보 작성 -->
    <body>
        <p> 안녕! </p>
        <p> Lorem ipsum dolor sit amet consectetur adipisicing elit. Sunt, ducimus ipsum maxime ab consectetur sint similique cumque nisi exercitationem unde expedita perferendis praesentium molestiae! Fugit dignissimos cumque repudiandae earum hic! </p>
        <script>
            /* 여기는 Java Script 영역 */
            alert('페이지 로딩 완료');
        </script>
    </body>

</html>
