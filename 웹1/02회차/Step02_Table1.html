<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_Table1</title>
</head>
<body>
    <table border="1" cellspacing="0" >

        <!-- 테이블 제목 -->
        <caption> 회원 목록 </caption> 

        <!-- 컬럼별 사이즈 -->
        <colgroup>
            <col width="60" />
            <col width="60" />
            <col width="60" />
        </colgroup>

        <!-- 컬럼별 이름 -->
        <thead>
            <tr>
                <th> 번호 </th>
                <th> 이름 </th>
                <th> 주소 </th>
            </tr>
        </thead>

        <!-- 표에 표시할 실제 정보 -->
        <tbody>
            <tr>
                <td>1</td>
                <td>짱구</td>
                <td>서울</td>
            </tr>

            <tr>
                <td>2</td>
                <td>짱아</td>
                <td>서울</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th> 인원 </th>
                <td></td>
                <td>2</td>
            </tr>
        </tfoot>

    </table>
</body>
</html>
