<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step03_List1</title>
    <style> 
        .square {
            list-style-type: square;
        }
        .hiragana {
            list-style-type: hiragana;
        }
        /* list-style-type 은 none | hiragana | square | circle 있음 */
    </style>
</head>
<body>
    <!-- 순서 없는 목록 -->
    <ul>
        <li> 하나 </li>
        <li> 두울 </li>
        <li> 세엣 </li>
    </ul>

    <ul class="square">
        <li> 하나 </li>
        <li> 두울 </li>
        <li> 세엣 </li>
    </ul>

    <ul class="hiragana">
        <li> 하나 </li>
        <li> 두울 </li>
        <li> 세엣 </li>
    </ul>

    <!-- 순서 이쑈는 목록 -->
    <ol>
        <li> 하나 </li>
        <li> 두울 </li>
        <li> 세엣 </li>
    </ol>

</body>
</html>
