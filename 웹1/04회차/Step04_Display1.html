<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step04_Display1</title>
    <style>
        /* 
        [block] 
        - 부모의 너비값까지 너비값으로 차지함
        - width, height 를 지정할 수 있다
        - margin, padding 을 가질 수 있다
        - 왼쪽, 오른쪽에 기본적으로 다른 요소가 올 수 없다

        [inline]
        - 본인의 크기만큼만 너비값으로 차지함
        - width, height 를 지정할 수 없다
        - margin, padding 이 부분적으로 적용된다 (가질 수 없다고 생각해도 무방)
        - 왼쪽, 오른쪽에 기본적으로 다른 요소가 올 수 있다

        [inline-block]
        - width, height 를 지정할 수 있다
        - margin, padding 을 가질 수 있다
        - 왼쪽, 오른쪽에 다른 요소가 올 수 있다
        - 필요하지 않은 여백이 생길 수 있다
        */
        #one {
            border: 1px solid red;
            width: 400px; /* display가 inline이면 width 값을 가질 수 없음 */
            display: inline;
        }
        #two {
            border: 1px solid blue;
            width: 400px;
            display: inline-block;
        }
        span {
            border: 1px solid green;
            display: block
            ;    
        }

    </style>
</head>
<body>
    <div id="one"> Lorem, ipsum dolor sit amet. </div>
    <div id="two"> Lorem, ipsum dolor sit amet. </div>
    <span> HELLO </span>
</body>
</html>
