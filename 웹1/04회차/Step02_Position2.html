<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_Position2</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid red;
        }
        .spacer {
            height: 300px;
            background-color: blanchedalmond;
        }
        #one {
            /* 현재 위치 기준으로 움직임 */ 
            position: relative;
            top: 150px; /* 원래 위치로부터 윗부분이 떨어진 거리 */
            left: 150px; /* 원래 위치로부터 왼쪽이 떨어진 거리 */
        }
        #two {
            /* 절대좌표 기준으로 움직임 */
            /* 
            특정 요소 기준 (절대좌표 기준)
            - 선택되어있지 않으면 html
            - 부모요소에 relative가 지정되어 있으면 그 부모를 기준으로 배치
            */
            position: absolute;
            top: 50px; /* 절대 좌표 기준으로 윗부분이 떨어진 거리 */
            left: 50px; /* 절대 좌표 기준으로 왼쪽이 떨어진 거리 */
        }
        #three {
            /* 스크롤에 따라오는 절대 좌표에 배치 */
            position: fixed;
            top: 50px;
            left: 50px;
        }

    </style>
</head>
<body>
    <div class="box" > static </div>
    <div class="box" id="one"> relative </div>
    <div class="spacer"> </div>
    <div class="box" id="two"> absolute </div>
    <div class="box"> 비교 </div>
    <div class="box" id="three"> fixed </div>
</body>
</html>
