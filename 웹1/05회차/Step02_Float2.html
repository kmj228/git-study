<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_Float2</title>
</head>
<style>
    .container {
        width: 900px;
        height: 280px;
        background-color: hotpink;
    }
    .left {
        width: 300px;
        height: 280px;
        background-color: greenyellow;
        float: left;
    }
    .center {
        width: 280px;
        height: 280px;
        margin: 0 10px;
        background-color: blue;
        float: left;
    }
    .right {
        width: 300px;
        height: 280px;
        background-color: orange;
        float: right;

    }
</style>
<body>
    <div class="container">

        <div class="left"></div>
        <div class="center"></div>
        <div class="right"></div>
        
    </div>

</body>
