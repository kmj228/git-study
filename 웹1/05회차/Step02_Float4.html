<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_Float4</title>
    <style>
        .myDiv {
            width: 1000px;
            margin: 0 auto;
        }
        .header {
            width: 1000px;
            height: 100px;
            background-color: orange;
            margin-bottom: 20px;
        }
        .snb {
            width: 200px;
            height: 700px;
            background-color: blue;
            float: left;
        }
        .contents {
            width: 790px;
            height: 700px;
            background-color: greenyellow;
            float: right;
        }
        .bottom-list {
            margin-top: 30px;
            width: 330px;
            height: 130px;
            background-color: pink;
            float: left;
        }
        .bottom-list-center {
            margin-top: 30px;
            width: 330px;
            height: 130px;
            background-color: pink;
            margin-left: 5px;
            margin-right: 5px;
            float: left;
        }
        .footer {
            margin-top: 20px;
            width: 1000px;
            height: 50px;
            background-color: gray;
            float: left;
        }

    </style>
</head>
<body>
    <div class="myDiv">
        <div class="header"> </div>

        <div>
            <div class="snb"> </div>
            <div class="contents"> </div>
            <div class="bottom-list"> </div>
            <div class="bottom-list-center"> </div>
            <div class="bottom-list"></div>
        </div>

        <div class="footer"> </div>
    </div>
</body>
</html>
