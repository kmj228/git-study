<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02회차/Step04_Card.html</title>
    <style>
        .wrapper {
            width: 400px;
            height: 400px;
            margin: 0 auto;

            perspective: 500px;
        }
        .target {
            position: relative;
            
            transform-style: preserve-3d;
            transform-origin: 50% 50%;
            transition: transform 0.5s ease-in-out;
        }
        .target > div {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid green;
            backface-visibility: hidden;
        }
        .target:hover {
            transform: rotateY(180deg)
        }
        .front {
            background-image: url(images/icon01.png);
        }
        .back {
            background-image: url(images/icon02.png);
            transform: rotateY(180deg)
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="target">
            <div class="front"></div>
            <div class="back"></div>
        </div>
    </div>
</body>
</html>
