<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step03_Datatype.html</title>
</head>
<body>
    <script>
        // [Datatype : 자료형]
        
        // number type
        var num1 = 10;
        var num2 = 10.123;

        // string type
        var text1 = "text";

        // boolean type
        var isTrue = true;
        var isFalse = 1; // 0이 아니면 다 false
        isFalse = 10 < 5

        // object type
        var member = {
            name : "짱구",
            age : 12,
            isMan : true
        };
        var obj = document.querySelector('h1');

        // array type
        var names = ["짱구", "짱아", "철수", "맹구"];
        var scores = [70, 60, 100, 80];

        // function type
        var f = function() {console.log("Hello world")};

        // undefined type
        var a;

        // numm type
        var b = null;

    </script>
</body>
</html>
