<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    h1 {
        font-size: 100px;
    }
</style>

<body>
    <p>
        1씩
        <button id="btn_plus_1">1</button>
        <button id="btn_minus_1">-1</button>
        <p></p>
    </p>
    <p>
        2씩
        <button id="btn_plus_2">2</button>
        <button id="btn_minus_2">-2</button>
    </p>
    <p>
        3씩
        <button id="btn_plus_3">3</button>
        <button id="btn_minus_3">-3</button>
    </p>

    <h1>0</h1>
    
</body>
<script>

    var number = 0;

    function numInsDes(temp) {
        number += temp;
        document.querySelector("h1").innerHTML = number;
    }


    btn_plus_1.addEventListener('click', function(){
        numInsDes(parseInt(document.querySelector("#btn_plus_1").innerHTML));
    })

    btn_minus_1.addEventListener('click', function(){
        numInsDes(parseInt(document.querySelector("#btn_minus_1").innerHTML));
    })

    btn_plus_2.addEventListener('click', function(){
        numInsDes(parseInt(document.querySelector("#btn_plus_2").innerHTML));
    })

    btn_minus_2.addEventListener('click', function(){
        numInsDes(parseInt(document.querySelector("#btn_minus_2").innerHTML));
    })

    btn_plus_3.addEventListener('click', function(){
        numInsDes(parseInt(document.querySelector("#btn_plus_3").innerHTML));
    })

    btn_minus_3.addEventListener('click', function(){
        numInsDes(parseInt(document.querySelector("#btn_minus_3").innerHTML));
    })


</script>

</html>
