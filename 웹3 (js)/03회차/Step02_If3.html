<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_If3.html</title>
</head>
<body>
    <div id="one"></div>
    <script>
        var num = parseInt(prompt("임의의 정수 입력"));
        
        if ((num % 2) == 0) {
            document.querySelector('#one').innerText = num + "은 짝수";
        } else {
            document.querySelector('#one').innerText = num + "은 홀수";
        }
    </script>
    
</body>
</html>
