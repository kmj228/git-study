<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_If4.html</title>
</head>
<body>
    
    <script>
        var input = prompt("값 입력");

        // 값 입력 안 하면, 빈 String 이 나옴
        // input == '' 말고 !input 로도 가능
        if (input == '') {
            console.log("입력된 값 없음");
        } else {
            console.log(`입력된 값 : ${input}`);
        }
    </script>
</body>
</html>
