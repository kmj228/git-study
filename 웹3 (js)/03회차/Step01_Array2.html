<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step01_Array2.html</title>
</head>

<body>
    <button onclick="test()">
        CLICK
    </button>

    <script>
        var members = [
            { num: 1, name: "짱구", addr: "안양" },
            { num: 2, name: "짱아", addr: "의왕" },
            { num: 3, name: "힌둥이", addr: "군포" },
            { num: 4, name: "철수", addr: "과천" }
        ]

        function test() {
            // 철수 주소 팡팡유치원으로 변경
            members[3].addr = "팡팡유치원";

            // 짱아 이름을 맹구로 변경
            members[1].name = "맹구";

            // 내 정보 추가
            members.push({
                num: 5,
                name: "민재",
                addr: "안양"
            });

            // 철수 삭제
            members.splice(3, 1);

            // 출력
            console.log(members);
        }
    </script>
</body>

</html>
