<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>animation</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="scene">
            <div class="cat">
                <!-- 머리 -->
                <div class="head">
                    <!-- 귀 -->
                    <div class="ear left"></div>
                    <div class="ear left inner"></div>

                    <div class="ear right"></div>
                    <div class="ear right inner"></div>
                    
                    <!-- 얼굴 -->
                    <div class="face">
                        <!-- 눈 왼쪽 -->
                        <div class="eye left">
                            <div class="pupil"></div>
                        </div>
                        <!-- 눈 오른쪽 -->
                        <div class="eye right">
                            <div class="pupil"></div>
                        </div>
                        <!-- 코 -->
                        <div class="nose"></div>
                        <!-- 수염 왼쪽 -->
                        <div class="whisker-group left">
                            <div class="whisker"></div>
                            <div class="whisker"></div>
                            <div class="whisker"></div>
                        </div>
                        <!-- 수염 오른쪽 -->
                        <div class="whisker-group right">
                            <div class="whisker"></div>
                            <div class="whisker"></div>
                            <div class="whisker"></div>
                        </div>
                    </div>
                </div>
                <!-- 몸통 -->
                <div class="body">
                    <!-- 손 -->
                    <div class="hand left"></div>
                    <div class="hand right"></div>
                    <!-- 발 -->
                    <div class="foot left"></div>
                    <div class="foot right"></div>
                    <!-- 배꼽 -->
                    <p class="navel"> * </p>
                </div>
            </div>
            <!-- 그림자 -->
            <div class="shadow"></div>
        </div>
    </body>
</html>
