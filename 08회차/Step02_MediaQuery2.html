<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step02_MediaQuery2.html</title>
    <style>
        p { display :none; }
        @media (max-width:767px) {
            #one { display:block;}
        }
        @media (min-width:768px) and (max-width:1023px) {
            #two { display: block;}
        }
        @media (min-width : 1024px) {
            #three { display:block; }
        }
    </style>
</head>
<body>
    <p id="one">
        нШДмЮђ deviceмЭШ widthлКФ 767px мЭінХШ
    </p>
    <p id="two">
        нШДмЮђ deviceмЭШ widthлКФ 768px мЭімГБ 1023px мЭінХШ
    </p>
    <p id="three">
        нШДмЮђ deviceмЭШ widthлКФ 1024px мЭімГБ
    </p>
</body>
</html>
